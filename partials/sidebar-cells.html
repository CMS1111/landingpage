<!--
  partials/sidebar-cells.html
  ═══════════════════════════════════════════════════════════════
  Each .link-cell represents one project in the sidebar.
  This file is fetched at runtime and injected into #cells-mount.

  TO ADD A PROJECT — copy one block below and update the values:

    data-id      — unique key, no spaces        e.g. "proj-5"
    data-title   — sidebar label
    data-url     — full https:// URL
    data-favicon — full URL to a favicon image
    data-desc1   — first paragraph   (required)
    data-desc2   — second paragraph  (optional, delete if unused)
    data-desc3   — third paragraph   (optional, delete if unused)

  TO REMOVE A PROJECT — delete the entire .link-cell block.
  ═══════════════════════════════════════════════════════════════
-->
