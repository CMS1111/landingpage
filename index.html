<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS1111 — Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════ -->
<header>
  <button class="hamburger" id="drawerBtn" aria-label="Open navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div class="header-rule"></div>
  <h1 id="siteTitle">CMS1111</h1>
  <div class="header-rule"></div>
</header>

<!-- ═══ LAYOUT ═══════════════════════════════════════════════ -->
<div class="layout">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <nav class="sidebar" id="sidebar" aria-label="Projects">
    <div class="sidebar-inner">
      <div class="sidebar-label">Projects</div>
      <!-- Project cells loaded from partials/sidebar-cells.html -->
      <div id="cells-mount"></div>
    </div>
  </nav>

  <!-- ── ABOUT PANEL ──────────────────────────────────────── -->
  <main class="about-panel" id="aboutPanel">

    <!-- Shown on load; clicking a project cell hides this.
         Clicking the CMS1111 header title restores it. -->
    <div class="bio-splash" id="bioSplash">
      <div class="bio-handle">CMS1111</div>
      <div class="bio-divider"></div>
      <p class="bio-tagline">
        Builder of scrapers, traders, and browser oddities.<br>
        Open-source tools for those who like to get their hands dirty.
      </p>
      <div class="bio-hint">Select a project to explore</div>
    </div>

    <!-- Populated by JS when a cell is clicked -->
    <div class="about-content" id="aboutContent">
      <div class="project-header" id="projectHeader">
        <img class="project-favicon" id="projectFavicon" src="" alt="" width="32" height="32">
        <a class="project-title-link" id="projectTitleLink" href="#" target="_blank" rel="noopener noreferrer"></a>
        <div class="project-url" id="projectUrl"></div>
      </div>
      <div class="about-body" id="aboutBody"></div>
    </div>

  </main>
</div><!-- /layout -->

<!-- Footer loaded from partials/footer.html — replaces this div -->
<div id="footer-mount"></div>

<div class="drawer-overlay" id="drawerOverlay"></div>

<!-- ALL SCRIPT MOVED TO js/main.js -->
<script src="js/main.js"></script>
</body>
</html>
