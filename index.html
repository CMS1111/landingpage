<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS1111 — Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
  /* ─── DESIGN TOKENS ─────────────────────────────────────── */
  :root {
    --bg-tile:          url('background.png');
    --neon-cream:       #f5ead0;          /* base cream */
    --neon-cream-glow:  #ffe8a0;          /* the "neon" — warm amber-cream */
    --neon-cream-dim:   rgba(245,234,208,0.18);
    --neon-cream-edge:  rgba(255,232,160,0.55);
    --cell-bg:          rgba(255,252,245,0.07);
    --cell-bg-hover:    rgba(255,240,190,0.13);
    --cell-bg-active:   rgba(255,232,160,0.19);
    --text-primary:     #f0e8d5;
    --text-dim:         rgba(240,232,213,0.55);
    --text-link:        #ffe8a0;
    --panel-bg:         rgba(12,10,8,0.72);
    --sidebar-bg:       rgba(8,7,5,0.78);
    --sidebar-w:        260px;
    --header-h:         72px;
    --footer-h:         64px;
    --radius:           10px;
    --radius-sm:        6px;
    --glow-sm:          0 0 8px rgba(255,232,160,0.35);
    --glow-md:          0 0 18px rgba(255,232,160,0.28), 0 0 40px rgba(255,232,160,0.10);
    --border:           1px solid var(--neon-cream-edge);
    --transition:       0.22s cubic-bezier(0.4,0,0.2,1);
    --font-display:     'Cinzel', serif;
    --font-body:        'Crimson Pro', serif;
    --font-mono:        'JetBrains Mono', monospace;
  }

  /* ─── RESET ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--font-body);
    color: var(--text-primary);
    background-color: #0c0a08;
    background-image: var(--bg-tile);
    background-repeat: repeat;
    background-size: auto;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* tinted overlay so bg.png doesn't overpower */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(8,6,4,0.54);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─────────────────────────────────────────────── */
  header {
    position: relative;
    z-index: 10;
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: var(--border);
    background: rgba(8,7,5,0.82);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
    gap: 18px;
  }

  header h1 {
    font-family: var(--font-display);
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--neon-cream-glow);
    text-shadow: var(--glow-md);
    text-transform: uppercase;
  }

  header .header-rule {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-cream-edge), transparent);
  }

  /* hamburger — mobile only */
  .hamburger {
    display: none;
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    padding: 7px 9px;
    gap: 5px;
    flex-direction: column;
    align-items: center;
  }
  .hamburger span {
    display: block;
    width: 20px;
    height: 1.5px;
    background: var(--neon-cream-glow);
    border-radius: 2px;
    transition: var(--transition);
  }

  /* ─── MAIN LAYOUT ────────────────────────────────────────── */
  .layout {
    position: relative;
    z-index: 1;
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── SIDEBAR ────────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: var(--border);
    backdrop-filter: blur(14px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform var(--transition);
  }

  .sidebar-inner {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--neon-cream-edge) transparent;
  }

  .sidebar-inner::-webkit-scrollbar { width: 4px; }
  .sidebar-inner::-webkit-scrollbar-thumb {
    background: var(--neon-cream-edge);
    border-radius: 2px;
  }

  .sidebar-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    padding: 4px 6px 8px;
    border-bottom: 1px solid rgba(255,232,160,0.12);
    margin-bottom: 4px;
  }

  /* ─── LINK CELL ──────────────────────────────────────────── */
  /*
   * TO ADD A CELL: copy one .link-cell block from the HTML below.
   * TO REMOVE:    delete the corresponding .link-cell block.
   * Required attributes on each cell:
   *   data-id        — unique string (e.g. "proj-6")
   *   data-title     — display title in sidebar
   *   data-url       — full target URL
   *   data-favicon   — full URL to the favicon (e.g. https://example.com/favicon.ico)
   *   data-desc-*    — up to 3 paragraph data attributes (desc-1, desc-2, desc-3)
   */
  .link-cell {
    background: var(--cell-bg);
    border: var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    cursor: pointer;
    transition: background var(--transition), box-shadow var(--transition), border-color var(--transition);
    display: flex;
    align-items: center;
    gap: 10px;
    user-select: none;
  }

  .link-cell:hover {
    background: var(--cell-bg-hover);
    border-color: var(--neon-cream-glow);
    box-shadow: var(--glow-sm);
  }

  .link-cell.active {
    background: var(--cell-bg-active);
    border-color: var(--neon-cream-glow);
    box-shadow: var(--glow-md);
  }

  .link-cell-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    border: 1px solid var(--neon-cream-edge);
    flex-shrink: 0;
    transition: background var(--transition), box-shadow var(--transition);
  }
  .link-cell.active .link-cell-dot,
  .link-cell:hover .link-cell-dot {
    background: var(--neon-cream-glow);
    box-shadow: 0 0 6px var(--neon-cream-glow);
  }

  .link-cell-title {
    font-family: var(--font-body);
    font-size: 0.92rem;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── ABOUT PANEL ────────────────────────────────────────── */
  .about-panel {
    flex: 1;
    overflow-y: auto;
    padding: clamp(20px, 4vw, 52px) clamp(16px, 5vw, 52px);
    scrollbar-width: thin;
    scrollbar-color: var(--neon-cream-edge) transparent;
  }

  .about-panel::-webkit-scrollbar { width: 4px; }
  .about-panel::-webkit-scrollbar-thumb {
    background: var(--neon-cream-edge);
    border-radius: 2px;
  }

  /* ─── BIO SPLASH ─────────────────────────────────────────── */
  .bio-splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    text-align: center;
    gap: 22px;
    animation: fadeUp 0.7s ease both;
  }

  .bio-handle {
    font-family: var(--font-display);
    font-size: 2.4rem;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: var(--neon-cream-glow);
    text-shadow: var(--glow-md);
    text-transform: uppercase;
  }

  .bio-divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-cream-edge), transparent);
  }

  .bio-tagline {
    font-family: var(--font-body);
    font-size: 1.05rem;
    font-style: italic;
    color: var(--text-dim);
    max-width: 420px;
    line-height: 1.75;
    font-weight: 300;
  }

  .bio-hint {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    color: rgba(245,234,208,0.3);
    text-transform: uppercase;
    margin-top: 12px;
  }

  /* ─── ABOUT CONTENT ──────────────────────────────────────── */
  .about-content {
    display: none;
    flex-direction: column;
    gap: 28px;
    animation: fadeUp 0.4s ease both;
    width: 100%;
    max-width: 680px;
  }

  .about-content.visible {
    display: flex;
  }

  /* project header card */
  .project-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: var(--cell-bg);
    border: var(--border);
    border-radius: var(--radius);
    padding: 28px 24px 22px;
    position: relative;
    overflow: hidden;
  }

  .project-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(255,232,160,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .project-favicon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    object-fit: contain;
    /* fallback bg if icon fails */
    background: var(--neon-cream-dim);
  }

  .project-title-link {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--neon-cream-glow);
    text-decoration: none;
    text-shadow: var(--glow-sm);
    text-align: center;
    text-transform: uppercase;
    transition: text-shadow var(--transition);
  }
  .project-title-link:hover {
    text-shadow: var(--glow-md);
  }

  .project-url {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-align: center;
    word-break: break-all;
  }

  /* description paragraphs */
  .about-body {
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: var(--cell-bg);
    border: var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
  }

  .about-body p {
    font-family: var(--font-body);
    font-size: 1rem;
    line-height: 1.8;
    font-weight: 300;
    color: var(--text-primary);
  }

  /* ─── FOOTER ─────────────────────────────────────────────── */
  footer {
    position: relative;
    z-index: 10;
    height: var(--footer-h);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    border-top: var(--border);
    background: rgba(8,7,5,0.82);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .footer-link {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-decoration: none;
    text-transform: uppercase;
    transition: color var(--transition), text-shadow var(--transition);
    padding: 4px 0;
    border-bottom: 1px solid transparent;
  }
  .footer-link:hover {
    color: var(--neon-cream-glow);
    text-shadow: var(--glow-sm);
    border-bottom-color: var(--neon-cream-edge);
  }

  .footer-sep {
    width: 1px;
    height: 16px;
    background: var(--neon-cream-edge);
    opacity: 0.35;
  }

  /* ─── DRAWER OVERLAY (mobile) ────────────────────────────── */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
    opacity: 0;
    transition: opacity var(--transition);
  }

  /* ─── ANIMATIONS ─────────────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── MOBILE ─────────────────────────────────────────────── */
  @media (max-width: 720px) {
    .hamburger { display: flex; }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      z-index: 60;
      transform: translateX(-100%);
      width: min(var(--sidebar-w), 80vw);
    }
    .sidebar.open { transform: translateX(0); }

    .drawer-overlay { display: block; }
    .drawer-overlay.visible { opacity: 1; pointer-events: auto; }

    .about-panel { padding: 24px 20px; }
    .about-body  { padding: 20px 18px; }
  }
</style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════ -->
<header>
  <button class="hamburger" id="drawerBtn" aria-label="Open navigation">
    <span></span><span></span><span></span>
  </button>
  <div class="header-rule"></div>
  <h1>CMS1111</h1>
  <div class="header-rule"></div>
</header>

<!-- ═══ LAYOUT ═══════════════════════════════════════════════ -->
<div class="layout">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <nav class="sidebar" id="sidebar" aria-label="Projects">
    <div class="sidebar-inner">

      <div class="sidebar-label">Projects</div>

      <!--
        ╔══════════════════════════════════════════════════════╗
        ║  LINK CELL TEMPLATE — copy/paste to add more        ║
        ║  data-id      : unique key (no spaces)              ║
        ║  data-title   : sidebar label                       ║
        ║  data-url     : full https:// URL                   ║
        ║  data-favicon : full URL to favicon image           ║
        ║  data-desc1   : first paragraph (required)          ║
        ║  data-desc2   : second paragraph (optional)         ║
        ║  data-desc3   : third paragraph (optional)          ║
        ╚══════════════════════════════════════════════════════╝
      -->

      <div class="link-cell"
           data-id="proj-1"
           data-title="YT Player Mobile Version"
           data-url="https://cms1111.github.io/YT_Playlist_Mobile/"
           data-favicon="https://github.com/favicon.ico"
           data-desc1="A video playlist creator for Youtube video to use on your mobile device."
           data-desc2="The player works best on Brave Browser. It was created specifically to tackle issues with playback on iPhone devices, where youtube restricts many playback features."
           data-desc3="Native Brave Browser features allows for ad-blocking. You can now turn your phone's display off and listen to a playlist of your videos in the background, or stream it to your car's stereo.">
        <span class="link-cell-dot"></span>
        <span class="link-cell-title">YT Player Mobile Version</span>
      </div>

      <div class="link-cell"
           data-id="proj-2"
           data-title="YT Player Desktop Version"
           data-url="https://cms1111.github.io/Youtube_playlist/"
           data-favicon="https://github.com/favicon.ico"
           data-desc1="A video playlist creator for Youtube video to use on your desktop browser."
           data-desc2="The player works best on desktop and currently has only been tested on firefox"
           data-desc3="Function include: import/export playlist, paste and add url buttons, video navigation buttons, and autoplay.">
        <span class="link-cell-dot"></span>
        <span class="link-cell-title">YT Player Desktop Version</span>
      </div>

      <div class="link-cell"
           data-id="proj-3"
           data-title="Any Playlist"
           data-url="https://github.com/CMS1111/AnyPlaylist"
           data-favicon="https://github.com/favicon.ico"
           data-desc1="A video playlist creator for most direct mp4 urls."
           data-desc2="Going beyond just youtube videos, this page will allow you to create a playlist of most mp4 links you have."
           data-desc3="There are many restrictions for mp4 embedding including CORS, where content is only playable if you're connected to the original domain. This project is in it's infancy, but I plan to tackle many of these restrictions in the future.">
        <span class="link-cell-dot"></span>
        <span class="link-cell-title">Any Playlist</span>
      </div>

      <div class="link-cell"
           data-id="proj-4"
           data-title="VR Playlist"
           data-url="https://github.com/CMS1111/vrplaylist"
           data-favicon="https://github.com/favicon.ico"
           data-desc1="A video playlist creator that converts video to VR."
           data-desc2="This project is still incomplete, check back soon."
           data-desc3="The final project will transform videos from a url into VR playback, with 360, 180, 2d Dual view, and features like zoom and pan">
        <span class="link-cell-dot"></span>
        <span class="link-cell-title">VR Playlist</span>
      </div>


    </div><!-- /sidebar-inner -->
  </nav><!-- /sidebar -->

  <!-- ── ABOUT PANEL ──────────────────────────────────────── -->
  <main class="about-panel" id="aboutPanel">

    <!-- BIO SPLASH: shown on load, hidden when a cell is clicked -->
    <div class="bio-splash" id="bioSplash">
      <div class="bio-handle">CMS1111</div>
      <div class="bio-divider"></div>
      <p class="bio-tagline">
        Builder of scrapers, traders, and browser oddities.<br>
        Open-source tools for those who like to get their hands dirty.
      </p>
      <div class="bio-hint">Select a project to explore</div>
    </div>

    <!-- ABOUT CONTENT: populated by JS when a cell is clicked -->
    <div class="about-content" id="aboutContent">
      <div class="project-header" id="projectHeader">
        <img class="project-favicon" id="projectFavicon" src="" alt="" width="32" height="32">
        <a class="project-title-link" id="projectTitleLink" href="#" target="_blank" rel="noopener noreferrer"></a>
        <div class="project-url" id="projectUrl"></div>
      </div>
      <div class="about-body" id="aboutBody"></div>
    </div>

  </main>
</div><!-- /layout -->

<!-- ═══ FOOTER ═══════════════════════════════════════════════ -->
<footer>
  <!-- Replace href="#" with your real URLs -->
  <a class="footer-link" href="https://github.com/CMS1111" target="_blank" rel="noopener noreferrer">GitHub</a>
  <div class="footer-sep"></div>
  <a class="footer-link" href="#" target="_blank" rel="noopener noreferrer">Linktree</a>
  <div class="footer-sep"></div>
  <a class="footer-link" href="#" target="_blank" rel="noopener noreferrer">Patreon</a>
  <div class="footer-sep"></div>
  <a class="footer-link" href="#" target="_blank" rel="noopener noreferrer">Buy Me a Coffee</a>
</footer>

<!-- ── DRAWER OVERLAY (mobile) ──────────────────────────── -->
<div class="drawer-overlay" id="drawerOverlay"></div>

<!-- ═══ SCRIPT ═══════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  const cells        = document.querySelectorAll('.link-cell');
  const bioSplash    = document.getElementById('bioSplash');
  const aboutContent = document.getElementById('aboutContent');
  const projectFavicon   = document.getElementById('projectFavicon');
  const projectTitleLink = document.getElementById('projectTitleLink');
  const projectUrl       = document.getElementById('projectUrl');
  const aboutBody        = document.getElementById('aboutBody');
  const sidebar          = document.getElementById('sidebar');
  const drawerBtn        = document.getElementById('drawerBtn');
  const drawerOverlay    = document.getElementById('drawerOverlay');

  /* ── populate about panel ── */
  function showProject(cell) {
    const url     = cell.dataset.url;
    const title   = cell.dataset.title;
    const favicon = cell.dataset.favicon;
    const descs   = [
      cell.dataset.desc1,
      cell.dataset.desc2,
      cell.dataset.desc3,
    ].filter(Boolean);

    projectFavicon.src = favicon;
    projectFavicon.alt = title + ' favicon';
    projectTitleLink.textContent = title;
    projectTitleLink.href = url;
    projectUrl.textContent = url;

    aboutBody.innerHTML = descs
      .map(d => `<p>${d}</p>`)
      .join('');

    bioSplash.style.display    = 'none';
    aboutContent.style.display = 'flex';

    /* re-trigger animation */
    aboutContent.classList.remove('visible');
    void aboutContent.offsetWidth;
    aboutContent.classList.add('visible');
  }

  /* ── cell click ── */
  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      cells.forEach(c => c.classList.remove('active'));
      cell.classList.add('active');
      showProject(cell);
      /* close drawer on mobile after selection */
      closeSidebar();
    });
  });

  /* ── mobile drawer ── */
  function openSidebar() {
    sidebar.classList.add('open');
    drawerOverlay.classList.add('visible');
    drawerBtn.setAttribute('aria-expanded', 'true');
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    drawerOverlay.classList.remove('visible');
    drawerBtn.setAttribute('aria-expanded', 'false');
  }

  drawerBtn.addEventListener('click', () => {
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });

  drawerOverlay.addEventListener('click', closeSidebar);

  /* ── keyboard: Escape closes drawer ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeSidebar();
  });

})();
</script>
</body>
</html>
